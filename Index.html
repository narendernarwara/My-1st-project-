<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>war zone middle east Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #f4f4f4;
        }

        header {
            background: #222;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav a {
            color: #f4f4f4;
            text-decoration: none;
        }

        main {
            padding: 20px;
        }

        section {
            margin: 20px 0;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        iframe {
            width: 100%;
            height: 450px;
            border: none;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
        }

        .share-buttons a {
            margin: 0 10px;
            color: #f4f4f4;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Real-Time News Dashboard</h1>
        <nav>
            <ul>
                <li><a href="#war-news">War News</a></li>
                <li><a href="#crypto-news">Crypto News</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="war-news">
            <h2>Middle East & Ukraine War Updates</h2>
            <div id="war-updates"></div>
            <iframe id="map" src="https://www.google.com/maps/embed?pb=" width="600" height="450" frameborder="0"></iframe>
        </section>

        <section id="crypto-news">
            <h2>Crypto Market Updates</h2>
            <div id="crypto-updates"></div>
            <button onclick="fetchAirdrops()">Check New Crypto Airdrops</button>
        </section>
    </main>

    <footer>
        <p>Live Streams</p>
        <a href="https://www.youtube.com/c/news_channel" target="_blank">War News Live Stream</a>
        <div class="share-buttons">
            <a href="#">Share on Facebook</a>
            <a href="#">Share on Twitter</a>
            <a href="#">Share on WhatsApp</a>
            <a href="#">Share on Instagram</a>
            <a href="#">Share on Telegram</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script>
        function fetchWarUpdates() {
            setTimeout(() => {
                const warUpdates = document.getElementById('war-updates');
                warUpdates.innerHTML = `
                    <p>Update: Tensions rise in the Middle East...</p>
                    <img src="image-url" alt="War Image">
                `;
                gsap.fromTo(warUpdates, { opacity: 0, y: -50 }, { opacity: 1, y: 0, duration: 1 });
            }, 1000);
        }

        function fetchCryptoUpdates() {
            setTimeout(() => {
                const cryptoUpdates = document.getElementById('crypto-updates');
                cryptoUpdates.innerHTML = `<p>Bitcoin price: $60,000</p>`;
                gsap.fromTo(cryptoUpdates, { opacity: 0, y: -50 }, { opacity: 1, y: 0, duration: 1 });
            }, 1000);
        }

        function fetchAirdrops() {
            alert("Fetching latest airdrops...");
        }

        setInterval(fetchWarUpdates, 5000);
        setInterval(fetchCryptoUpdates, 5000);
    </script>
</body>
</html>
